<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Grimoire{% endblock %}</title>
  <link rel="alternate" type="application/atom+xml"
        title="Grimoire OPDS catalog" href="/opds">
  <style>
    :root {
      color-scheme: light dark;
      --bg:        #fdfdfc;
      --bg-soft:   #f5f3ef;
      --bg-hover:  #ebe8e1;
      --border:    #d9d5cb;
      --text:      #1f1f1d;
      --text-soft: #6b6b66;
      --text-mute: #8a8a83;
      --accent:    #0f5a8a;
      --accent-bg: #e4eef6;
      --danger:    #9b2c2c;
      --radius:    4px;
      --ui-font:   -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --body-font: "Charter", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      --mono-font: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #17181a;
        --bg-soft:   #1f2124;
        --bg-hover:  #282b2f;
        --border:    #2f3236;
        --text:      #e6e5e2;
        --text-soft: #a8a79f;
        --text-mute: #74736b;
        --accent:    #4aa3d9;
        --accent-bg: #1d3346;
        --danger:    #e06c6c;
      }
    }

    * { box-sizing: border-box; }
    html, body { background: var(--bg); color: var(--text); }
    body {
      font: 14px/1.55 var(--ui-font);
      margin: 0;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* --- top bar --------------------------------------------------------- */
    header.topbar {
      display: flex; align-items: center; gap: 1rem;
      padding: .55rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-soft);
      position: sticky; top: 0; z-index: 10;
    }
    header.topbar h1 {
      font: 600 15px/1 var(--ui-font);
      margin: 0;
      letter-spacing: .01em;
    }
    header.topbar h1 a { color: var(--text); }
    header.topbar h1 a:hover { text-decoration: none; }
    header.topbar form.search {
      flex: 1; max-width: 520px;
    }
    header.topbar form.search input {
      width: 100%; padding: .4rem .7rem;
      font: 14px var(--ui-font);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
    }
    header.topbar form.search input:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }
    header.topbar nav a {
      margin-left: .9rem;
      color: var(--text-soft);
      font-size: 13px;
    }

    /* --- page grid ------------------------------------------------------- */
    main.page {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 0;
      max-width: 1280px;
      margin: 0 auto;
    }
    @media (max-width: 760px) {
      main.page { grid-template-columns: 1fr; }
      aside.sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    }

    /* --- sidebar --------------------------------------------------------- */
    aside.sidebar {
      padding: 1rem;
      border-right: 1px solid var(--border);
      font-size: 13px;
      height: calc(100vh - 50px);
      overflow-y: auto;
      position: sticky; top: 50px;
    }
    aside.sidebar section { margin-bottom: 1.25rem; }
    aside.sidebar h2 {
      font: 600 10px/1 var(--ui-font);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-mute);
      margin: 0 0 .4rem;
      padding: 0 .25rem;
    }
    aside.sidebar ul {
      list-style: none; margin: 0; padding: 0;
    }
    aside.sidebar li { display: flex; align-items: baseline; }
    aside.sidebar li > a {
      flex: 1;
      padding: .14rem .4rem;
      border-radius: var(--radius);
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    aside.sidebar li > a:hover {
      background: var(--bg-hover);
      text-decoration: none;
    }
    aside.sidebar li > a.active {
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 600;
    }
    aside.sidebar .count {
      color: var(--text-mute);
      font: 11px var(--mono-font);
      padding: 0 .3rem;
    }
    aside.sidebar .scroll-box {
      max-height: 240px;
      overflow-y: auto;
    }

    /* --- items column ---------------------------------------------------- */
    section.items {
      padding: 0;
      min-width: 0;  /* allow children to truncate */
    }
    .toolbar {
      display: flex; align-items: center; gap: .75rem;
      padding: .55rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 50px; z-index: 5;
      flex-wrap: wrap;
    }
    .toolbar .chips {
      flex: 1; display: flex; flex-wrap: wrap; gap: .3rem;
      min-width: 0;
    }
    .toolbar .count-and-sort {
      color: var(--text-mute); font-size: 12px;
      display: flex; align-items: center; gap: .6rem;
      white-space: nowrap;
    }
    .toolbar select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      font: 12px var(--ui-font);
      padding: .2rem .4rem;
    }

    .chip {
      display: inline-flex; align-items: center; gap: .25rem;
      padding: .1rem .4rem;
      font-size: 11px;
      background: var(--accent-bg);
      color: var(--accent);
      border-radius: 999px;
      border: 1px solid transparent;
    }
    .chip a { color: inherit; }
    .chip .clear {
      font-weight: 600;
      opacity: .7;
      padding-left: .15rem;
    }
    .chip .clear:hover { opacity: 1; text-decoration: none; }
    .chip-type { background: var(--bg-hover); color: var(--text-soft); }

    /* --- item list ------------------------------------------------------- */
    ol.item-list {
      list-style: none; margin: 0; padding: 0;
    }
    li.item-row {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: .75rem;
      padding: .65rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    li.item-row:hover { background: var(--bg-soft); }
    li.item-row .main { min-width: 0; }
    li.item-row h3 {
      margin: 0 0 .1rem;
      font: 500 14px/1.3 var(--ui-font);
    }
    li.item-row h3 a { color: var(--text); }
    li.item-row h3 a:hover { color: var(--accent); text-decoration: none; }
    li.item-row .meta {
      font-size: 12px;
      color: var(--text-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    li.item-row .meta a { color: inherit; }
    li.item-row .meta a:hover { color: var(--accent); }
    li.item-row .abstract {
      margin: .25rem 0 0;
      font: 13px/1.5 var(--body-font);
      color: var(--text-soft);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .row-actions {
      display: flex; align-items: flex-start; gap: .25rem;
      opacity: 0;
      transition: opacity 80ms linear;
    }
    li.item-row:hover .row-actions { opacity: 1; }
    li.item-row:focus-within .row-actions { opacity: 1; }
    .row-actions a {
      font: 500 11px var(--ui-font);
      padding: .2rem .45rem;
      border-radius: var(--radius);
      color: var(--text-soft);
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .row-actions a:hover {
      color: var(--accent);
      background: var(--accent-bg);
      border-color: var(--accent-bg);
      text-decoration: none;
    }

    .tag {
      display: inline-block;
      font: 500 10px var(--ui-font);
      padding: .05rem .35rem;
      margin-right: .2rem;
      background: var(--bg-hover);
      color: var(--text-soft);
      border-radius: 3px;
      letter-spacing: .02em;
    }

    /* --- pager ----------------------------------------------------------- */
    nav.pager {
      display: flex; align-items: baseline; gap: .75rem;
      padding: 1rem; color: var(--text-mute); font-size: 13px;
    }
    nav.pager .spacer { flex: 1; }
    nav.pager a {
      padding: .3rem .6rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-soft);
    }
    nav.pager a:hover { background: var(--bg-hover); text-decoration: none; color: var(--text); }

    /* --- detail page ----------------------------------------------------- */
    article.detail {
      max-width: 780px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    article.detail .back-link { font-size: 13px; color: var(--text-soft); }
    article.detail h1 {
      font: 500 22px/1.3 var(--ui-font);
      margin: .6rem 0 .3rem;
      color: var(--text);
    }
    article.detail .byline {
      color: var(--text-soft); font-size: 14px;
      margin: 0 0 1rem;
    }
    article.detail .byline a { color: inherit; }
    article.detail .byline a:hover { color: var(--accent); }
    article.detail .actions {
      display: flex; gap: .5rem; flex-wrap: wrap;
      margin: 1rem 0 1.5rem;
    }
    article.detail .actions a, article.detail .actions button {
      font: 500 13px var(--ui-font);
      padding: .4rem .85rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--bg);
      cursor: pointer;
    }
    article.detail .actions a.primary {
      background: var(--accent);
      color: #fff; border-color: var(--accent);
    }
    article.detail .actions a.primary:hover {
      filter: brightness(1.08);
      text-decoration: none;
    }
    article.detail .actions a:hover, article.detail .actions button:hover {
      background: var(--bg-hover);
      text-decoration: none;
    }
    article.detail h2 {
      font: 600 12px/1 var(--ui-font);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-mute);
      margin: 2rem 0 .5rem;
    }
    article.detail p, article.detail li {
      font: 15px/1.65 var(--body-font);
    }
    article.detail dl.meta {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: .25rem 1rem;
      font-size: 13px; font-family: var(--ui-font);
      margin: .5rem 0 1rem;
    }
    article.detail dl.meta dt {
      color: var(--text-mute);
      font-weight: normal;
    }
    article.detail dl.meta dd {
      margin: 0; color: var(--text);
    }
    article.detail dl.meta code {
      font: 12px var(--mono-font);
    }
    article.detail ul.related-list {
      list-style: none; padding: 0; margin: 0;
    }
    article.detail ul.related-list li {
      font: 13px var(--ui-font);
      padding: .3rem 0;
      border-bottom: 1px dashed var(--border);
    }
    article.detail pre.bibtex {
      font: 12px/1.5 var(--mono-font);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .8rem 1rem;
      overflow-x: auto;
      white-space: pre;
    }
    .bibtex-wrap { position: relative; }
    .bibtex-wrap .copy {
      position: absolute; top: .4rem; right: .5rem;
      font: 11px var(--ui-font);
      padding: .2rem .5rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-soft);
      cursor: pointer;
    }
    .bibtex-wrap .copy:hover { color: var(--accent); }

    .empty {
      padding: 3rem 1rem; text-align: center;
      color: var(--text-mute);
      font: 14px var(--ui-font);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1><a href="/">Grimoire</a></h1>
    {% block topbar_search %}{% endblock %}
    <nav>
      <a href="/">Browse</a>
      <a href="/opds">OPDS</a>
    </nav>
  </header>
  {% block body %}{% endblock %}
</body>
</html>
